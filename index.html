<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Structures Playground (Vanilla)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="container header">
    <a class="back-link" href="https://abhikhur27.github.io/" target="_blank" rel="noreferrer">Back to Portfolio</a>
    <h1>Data Structures Playground (Vanilla)</h1>
    <p>Explore stack, queue, and binary search tree operations without framework overhead.</p>
  </header>

  <main class="container layout">
    <section class="panel controls">
      <h2>Controls</h2>

      <div class="tabs" role="tablist" aria-label="Structure selection">
        <button class="tab active" data-tab="stack" role="tab" aria-selected="true">Stack</button>
        <button class="tab" data-tab="queue" role="tab" aria-selected="false">Queue</button>
        <button class="tab" data-tab="bst" role="tab" aria-selected="false">BST</button>
      </div>

      <label>
        Value
        <input id="value-input" type="number" placeholder="Enter number" />
      </label>

      <div class="button-grid">
        <button id="add-btn" class="primary" type="button">Push</button>
        <button id="remove-btn" type="button">Pop</button>
        <button id="search-btn" class="hidden" type="button">Search</button>
        <button id="traverse-btn" class="hidden" type="button">Traverse</button>
        <button id="clear-btn" type="button">Clear</button>
        <button id="undo-btn" type="button">Undo</button>
        <button id="export-state-btn" type="button">Export State</button>
        <button id="import-state-btn" type="button">Import State</button>
        <button id="export-log-btn" type="button">Export Log</button>
        <button id="sample-btn" type="button">Load Sample</button>
      </div>
      <input id="import-state-file" type="file" accept="application/json" class="hidden" />

      <p id="status" class="status" aria-live="polite">Stack selected.</p>
      <p id="traversal-output" class="status mono"></p>

      <div class="button-grid">
        <article class="metric-card">
          <h4>Size</h4>
          <p id="metric-size">0</p>
        </article>
        <article class="metric-card">
          <h4>BST Height</h4>
          <p id="metric-height">0</p>
        </article>
      </div>

      <h3>Operation Log</h3>
      <ul id="log" class="log"></ul>
    </section>

    <section class="panel visual">
      <div class="visual-head">
        <h2 id="structure-title">Stack Visualization</h2>
        <p id="structure-note">Last-in, first-out behavior.</p>
      </div>

      <div id="visual-area" class="visual-area"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
